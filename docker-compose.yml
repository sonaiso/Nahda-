services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nahda
      POSTGRES_USER: nahda
      POSTGRES_PASSWORD: nahda
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nahda -d nahda"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      NAHDA_APP_ENV: development
      NAHDA_DATABASE_URL: postgresql+psycopg://nahda:nahda@db:5432/nahda
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
