route:
  receiver: webhook
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 2h
  routes:
    - receiver: slack
      matchers:
        - severity="critical"
    - receiver: webhook
      matchers:
        - severity="warning"

receivers:
  - name: webhook
    webhook_configs:
      - url: ${NAHDA_ALERT_WEBHOOK_URL}

  - name: slack
    slack_configs:
      - api_url: ${NAHDA_ALERT_SLACK_WEBHOOK_URL}
        channel: "#nahda-alerts"
        send_resolved: true
