name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: nahda
          POSTGRES_USER: nahda
          POSTGRES_PASSWORD: nahda
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nahda -d nahda"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      NAHDA_DATABASE_URL: postgresql+psycopg://nahda:nahda@localhost:5432/nahda

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Wait for Postgres
        run: |
          connected=0
          for i in {1..20}; do
            if python -c "import psycopg; psycopg.connect('${NAHDA_DATABASE_URL}').close()"; then
              connected=1
              break
            fi
            sleep 2
          done
          if [ "$connected" -ne 1 ]; then
            echo "Postgres is not reachable"
            exit 1
          fi

      - name: Run Ruff
        run: |
          ruff check .

      - name: Run mypy
        run: |
          mypy

      - name: Run Bandit (SAST)
        run: |
          bandit -q -r app

      - name: Run pip-audit (dependency vulnerabilities)
        run: |
          pip-audit -r requirements/security-audit.txt

      - name: Run tests with coverage gate
        run: |
          pytest -q
