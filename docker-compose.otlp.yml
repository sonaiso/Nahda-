services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.120.0
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./ops/observability/otel-collector.yml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"

  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "14268:14268"
      - "4319:4318"

  app:
    environment:
      NAHDA_OTEL_ENABLED: "true"
      NAHDA_OTEL_EXPORTER: otlp
      NAHDA_OTEL_OTLP_ENDPOINT: http://otel-collector:4318/v1/traces
    depends_on:
      - otel-collector
      - jaeger
